<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng nhập — ComicsWeb">
  <title>Đăng nhập — ComicsWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>

  <main class="container">
    <div class="cw-auth-card anim-fade-in">
      <h2 class="cw-auth-card__title">
        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
      </h2>

      <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm">
        <div class="cw-form-group">
          <label class="cw-form-label" for="loginEmail">Email</label>
          <input type="email" class="cw-form-input" id="loginEmail"
                 placeholder="email@example.com" required>
        </div>
        <div class="cw-form-group">
          <label class="cw-form-label" for="loginPassword">Mật khẩu</label>
          <input type="password" class="cw-form-input" id="loginPassword"
                 placeholder="Nhập mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-cw-primary w-100 mt-3">
          <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
        </button>
      </form>

      <p class="text-center mt-3" style="color:var(--text-muted);font-size:0.9rem;">
        Chưa có tài khoản?
        <a href="register.html" style="color:var(--color-primary);font-weight:600;">Đăng ký ngay</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initComponents('login');

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('login-error');
        errEl.classList.add('d-none');

        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        try {
          await Auth.login(email, password);
          showToast('Đăng nhập thành công!', 'success');
          setTimeout(() => window.location.href = '../index.html', 500);
        } catch (err) {
          errEl.textContent = err.message || 'Email hoặc mật khẩu không đúng';
          errEl.classList.remove('d-none');
        }
      });
    });
  </script>
</body>
</html>
