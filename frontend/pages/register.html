<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng ký tài khoản — ComicsWeb">
  <title>Đăng ký — ComicsWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>

  <main class="container">
    <div class="cw-auth-card anim-fade-in">
      <h2 class="cw-auth-card__title">
        <i class="bi bi-person-plus"></i> Đăng ký
      </h2>

      <div id="register-error" class="alert alert-danger d-none" role="alert"></div>

      <form id="registerForm">
        <div class="cw-form-group">
          <label class="cw-form-label" for="regName">Tên hiển thị</label>
          <input type="text" class="cw-form-input" id="regName"
                 placeholder="Tên của bạn" required>
        </div>
        <div class="cw-form-group">
          <label class="cw-form-label" for="regEmail">Email</label>
          <input type="email" class="cw-form-input" id="regEmail"
                 placeholder="email@example.com" required>
        </div>
        <div class="cw-form-group">
          <label class="cw-form-label" for="regPassword">Mật khẩu</label>
          <input type="password" class="cw-form-input" id="regPassword"
                 placeholder="Ít nhất 6 ký tự" minlength="6" required>
        </div>
        <div class="cw-form-group">
          <label class="cw-form-label" for="regPassword2">Xác nhận mật khẩu</label>
          <input type="password" class="cw-form-input" id="regPassword2"
                 placeholder="Nhập lại mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-cw-primary w-100 mt-3">
          <i class="bi bi-person-plus"></i> Đăng ký
        </button>
      </form>

      <p class="text-center mt-3" style="color:var(--text-muted);font-size:0.9rem;">
        Đã có tài khoản?
        <a href="login.html" style="color:var(--color-primary);font-weight:600;">Đăng nhập</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initComponents('');

      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('register-error');
        errEl.classList.add('d-none');

        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pw = document.getElementById('regPassword').value;
        const pw2 = document.getElementById('regPassword2').value;

        if (pw !== pw2) {
          errEl.textContent = 'Mật khẩu xác nhận không khớp!';
          errEl.classList.remove('d-none');
          return;
        }

        try {
          await Auth.register(email, pw, name);
          showToast('Đăng ký thành công!', 'success');
          setTimeout(() => window.location.href = '../index.html', 500);
        } catch (err) {
          errEl.textContent = err.message || 'Đăng ký thất bại';
          errEl.classList.remove('d-none');
        }
      });
    });
  </script>
</body>
</html>
