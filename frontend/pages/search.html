<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tìm kiếm truyện tranh — ComicsWeb">
  <title>Tìm kiếm — ComicsWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>

  <main class="container py-4">
    <!-- Search Bar -->
    <div class="row justify-content-center mb-4 anim-fade-in">
      <div class="col-lg-8">
        <h2 class="cw-section__title--center mb-4" style="font-family:var(--font-heading);font-weight:900;font-size:2rem;">
          Tìm kiếm truyện
        </h2>
        <div class="cw-search">
          <i class="bi bi-search cw-search__icon"></i>
          <input type="text" class="cw-search__input" id="search-input"
                 placeholder="Nhập tên truyện hoặc tác giả...">
        </div>
      </div>
    </div>

    <!-- Genre Filters -->
    <div class="d-flex flex-wrap gap-2 justify-content-center mb-4" id="genre-filters">
      <!-- JS sẽ render genre buttons -->
    </div>

    <!-- Results -->
    <div class="row" id="search-results">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Đang tải...</span>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/search.js"></script>
</body>
</html>
