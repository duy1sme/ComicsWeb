<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ComicsWeb — Website đọc truyện tranh trực tuyến miễn phí. Cập nhật nhanh, chất lượng cao.">
  <title>ComicsWeb — Đọc Truyện Tranh Online</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- ═══ HERO BANNER ═══ -->
  <section class="cw-hero" id="heroBanner">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-7">
          <h1 class="cw-hero__title">Khám phá thế giới<br>truyện tranh</h1>
          <p class="cw-hero__subtitle">
            Hàng ngàn bộ truyện hấp dẫn đang chờ bạn. Cập nhật nhanh nhất, 
            chất lượng hình ảnh cao nhất — hoàn toàn miễn phí.
          </p>
          <div class="d-flex gap-3">
            <a href="pages/search.html" class="btn btn-cw-primary">
              <i class="bi bi-search"></i> Khám phá ngay
            </a>
            <a href="pages/register.html" class="btn btn-cw-outline">
              <i class="bi bi-person-plus"></i> Tạo tài khoản
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ TRUYỆN NỔI BẬT ═══ -->
  <section class="cw-section">
    <div class="container">
      <h2 class="cw-section__title">
        <i class="bi bi-fire"></i> Truyện nổi bật
      </h2>
      <div class="row" id="featured-comics">
        <!-- JS sẽ render comic cards vào đây -->
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Đang tải...</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ MỚI CẬP NHẬT ═══ -->
  <section class="cw-section" style="background: var(--bg-surface);">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="cw-section__title mb-0">
          <i class="bi bi-clock-history"></i> Mới cập nhật
        </h2>
        <a href="pages/search.html" class="btn btn-sm btn-cw-outline">
          Xem tất cả <i class="bi bi-arrow-right"></i>
        </a>
      </div>
      <div class="row" id="latest-comics">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Đang tải...</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ Scripts ═══ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
